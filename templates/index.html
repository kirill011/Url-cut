<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Url cut</title>
</head>

<body>
    <center>
        {{if .Status}}
        {{.Status}}
        {{end}}
        {{if .Link}}
        Сокращённая ссылка ({{.Link}})
        <br><input type="url" readonly size="100" value="http://localhost:8080/{{.Short}}">
        {{else}}
        <br>
        <form action="/" name=f method="POST">
            <input maxLength=1024 size=70 name=s value="" title="Input link">
            <input type=submit value="Show short link" name=qr>
        </form>
        <br>
        {{end}}
    </center>
</body>

</html>
